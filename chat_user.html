<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محادثة نجدة</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#111827;
    padding:15px;
    text-align:center;
}

#msgs{
    flex:1;
    padding:15px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    padding:10px;
    border-radius:10px;
    max-width:70%;
}

.user{
    background:#ffd700;
    color:black;
    align-self:flex-start;
}

.tech{
    background:#1e293b;
    align-self:flex-end;
}

.inputBox{
    display:flex;
    padding:10px;
    gap:10px;
    background:#0f172a;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#ffd700;
    font-weight:bold;
}
</style>
</head>

<body>

<header>👨‍🔧 محادثة النجدة</header>

<div id="msgs"></div>

<div class="inputBox">
<input id="input" placeholder="اكتب رسالة..." />
<button onclick="send()">إرسال</button>
</div>

<script>
function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;

    let box = document.getElementById("msgs");

    let u = document.createElement("div");
    u.className = "msg user";
    u.innerText = text;
    box.appendChild(u);

    let t = document.createElement("div");
    t.className = "msg tech";
    t.innerText = "👨‍🔧 سيتم الرد عليك من الفني قريبًا";
    box.appendChild(t);

    input.value = "";
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
