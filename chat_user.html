<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محادثة الخدمة</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:white;
    display:flex;
    height:100vh;
}

/* ===== HEADER ===== */
.topbar{
    background:#111827;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

/* ===== CHAT ===== */
.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* messages */
.messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* bubbles */
.msg{
    max-width:70%;
    padding:12px 15px;
    border-radius:15px;
    line-height:1.6;
    animation:pop 0.2s ease;
    word-wrap:break-word;
}

/* USER */
.user{
    align-self:flex-start;
    background:#ffd700;
    color:black;
    border-bottom-left-radius:0;
}

/* TECH */
.tech{
    align-self:flex-end;
    background:#1e293b;
    border-bottom-right-radius:0;
    border:1px solid rgba(255,255,255,0.1);
}

/* INPUT */
.inputBox{
    display:flex;
    padding:10px;
    background:#0f172a;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    outline:none;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#ffd700;
    font-weight:bold;
    cursor:pointer;
}

/* animation */
@keyframes pop{
    from{transform:scale(0.95); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* small badge */
.badge{
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="chat">

<div class="topbar">
👨‍🔧 محادثة مع الفني - <span class="badge">متصل الآن</span>
</div>

<div class="messages" id="messages">

<div class="msg tech">
👋 مرحباً، أنا الفني الخاص بك. كيف يمكنني مساعدتك؟
</div>

</div>

<div class="inputBox">
<input id="input" placeholder="اكتب رسالتك للفني..." />
<button onclick="send()">إرسال</button>
</div>

</div>

<script>

function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(text === "") return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(()=>{
        techReply(text);
    },700);
}

function addMessage(text, type){
    let msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;

    document.getElementById("messages").appendChild(msg);
    document.getElementById("messages").scrollTop = 999999;
}

/* ===== TECH REPLY (مؤقت) ===== */
function techReply(text){
    let reply = "";

    if(text.includes("مشكلة") || text.includes("عطل")){
        reply = "تمام 👍 أرسل لي التفاصيل أو الموقع وسأحل المشكلة.";
    }
    else if(text.includes("كهرباء")){
        reply = "⚡ فهمت، أنا فني كهرباء وسأساعدك فورًا.";
    }
    else if(text.includes("سباكة")){
        reply = "🚰 تم، أحتاج فقط موقعك للتوجه.";
    }
    else if(text.includes("سيارة")){
        reply = "🚗 حاضر، هل المشكلة بطارية أم إطار؟";
    }
    else{
        reply = "تمام، وضح لي أكثر وسأساعدك 👍";
    }

    addMessage(reply, "tech");
}

</script>

</body>
</html>
