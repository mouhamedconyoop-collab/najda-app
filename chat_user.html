<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محادثة المستخدم</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    padding:15px;
    background:#111827;
    text-align:center;
}

.messages{
    flex:1;
    padding:15px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    padding:10px 15px;
    border-radius:12px;
    max-width:70%;
}

.user{
    background:#ffd700;
    color:black;
    align-self:flex-start;
}

.tech{
    background:#1e293b;
    align-self:flex-end;
}

.inputBox{
    display:flex;
    padding:10px;
    background:#0f172a;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:12px 16px;
    background:#ffd700;
    border:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
👨‍🔧 محادثة مع الفني
</header>

<div class="messages" id="messages"></div>

<div class="inputBox">
<input id="input" placeholder="اكتب رسالتك..." />
<button onclick="send()">إرسال</button>
</div>

<script>

function load(){
    let msgs = JSON.parse(localStorage.getItem("msgs") || "[]");
    let box = document.getElementById("messages");
    box.innerHTML = "";

    msgs.forEach(m=>{
        let div = document.createElement("div");
        div.className = "msg " + m.type;
        div.innerText = m.text;
        box.appendChild(div);
    });

    box.scrollTop = 999999;
}

function send(){
    let input = document.getElementById("input");
    if(input.value.trim() === "") return;

    let msgs = JSON.parse(localStorage.getItem("msgs") || "[]");

    msgs.push({
        type:"user",
        text:input.value
    });

    localStorage.setItem("msgs", JSON.stringify(msgs));

    input.value = "";
    load();
}

setInterval(load,1000);
load();

</script>

</body>
</html>
