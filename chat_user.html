<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد نجدة الذكي</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:white;
    display:flex;
    height:100vh;
}

/* ===== SIDEBAR (optional style) ===== */
.sidebar{
    width:250px;
    background:#0f172a;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.sidebar h2{
    font-size:18px;
    margin-bottom:10px;
}

.newchat{
    padding:10px;
    background:#1e293b;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

/* ===== CHAT AREA ===== */
.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    padding:15px;
    background:#111827;
    text-align:center;
    font-weight:bold;
}

/* messages */
.messages{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* bubbles */
.msg{
    max-width:70%;
    padding:12px 15px;
    border-radius:15px;
    line-height:1.6;
    animation:pop 0.2s ease;
}

.user{
    align-self:flex-start;
    background:#ffd700;
    color:black;
    border-bottom-left-radius:0;
}

.bot{
    align-self:flex-end;
    background:#1e293b;
    border-bottom-right-radius:0;
}

/* input */
.inputBox{
    display:flex;
    padding:10px;
    background:#0f172a;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#111827;
    color:white;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#ffd700;
    cursor:pointer;
    font-weight:bold;
}

/* animation */
@keyframes pop{
    from{transform:scale(0.95); opacity:0;}
    to{transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>🜸 نجدة AI</h2>
    <div class="newchat" onclick="clearChat()">+ محادثة جديدة</div>
</div>

<div class="chat">

<div class="header">
🤖 مساعد نجدة الذكي
</div>

<div class="messages" id="messages">

<div class="msg bot">
مرحباً 👋 أنا مساعد نجدة، كيف أقدر أساعدك؟
</div>

</div>

<div class="inputBox">
<input id="input" placeholder="اكتب رسالتك..." />
<button onclick="send()">إرسال</button>
</div>

</div>

<script>
function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(text === "") return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(()=>{
        botReply(text);
    },500);
}

function addMessage(text, type){
    let msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;

    document.getElementById("messages").appendChild(msg);
    document.getElementById("messages").scrollTop = 999999;
}

function botReply(text){
    let reply = "";

    if(text.includes("كهرباء")){
        reply = "⚡ يمكنك طلب فني كهرباء من صفحة الخدمات.";
    }
    else if(text.includes("سباكة")){
        reply = "🚰 يوجد فنيين سباكة جاهزين قريب منك.";
    }
    else if(text.includes("سيارة")){
        reply = "🚗 خدمة السيارات متوفرة (بطارية - سحب - إطار).";
    }
    else{
        reply = "أنا هنا لمساعدتك 👍 اختر الخدمة من الصفحة الرئيسية أو اكتب المشكلة بالتفصيل.";
    }

    addMessage(reply, "bot");
}

function clearChat(){
    document.getElementById("messages").innerHTML = `
        <div class="msg bot">محادثة جديدة 👋 كيف أساعدك؟</div>
    `;
}
</script>

</body>
</html>
