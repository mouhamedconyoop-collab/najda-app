<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النجدة | الخدمات الطوارئ</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
overflow-x:hidden;
}

.hero{
min-height:100vh;
padding:40px 20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
radial-gradient(circle at top,#2a2a2a 0%,#0b0b0b 60%);
}

.logo{
font-size:85px;
margin-bottom:10px;
animation:float 3s ease-in-out infinite;
}

.hero h1{
font-size:48px;
color:#ffd700;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#cfcfcf;
line-height:1.8;
max-width:600px;
margin-bottom:30px;
}

.main-btn{
display:inline-block;
background:#ffd700;
color:#000;
padding:16px 35px;
border-radius:50px;
font-size:18px;
font-weight:bold;
text-decoration:none;
transition:.3s;
}

.main-btn:hover{
transform:scale(1.05);
}

.features{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
}

.feature{
background:#151515;
border:1px solid #222;
padding:12px 18px;
border-radius:30px;
font-size:14px;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@media(max-width:768px){

.hero h1{
font-size:38px;
}

.logo{
font-size:70px;
}

.hero p{
font-size:16px;
}
}
</style>
</head>

<body>

<section class="hero">

<div class="logo">🜸</div>

<h1>النجدة</h1>

<p>
خدمات الطوارئ المنزلية والسيارات على مدار الساعة.
احصل على المساعدة بسرعة من فنيين متخصصين ومعتمدين.
</p>

<a href="#services" class="main-btn">
اطلب خدمة الآن
</a>

<div class="features">
<div class="feature">⚡ الكهرباء</div>
<div class="feature">🚰 السباكة</div>
<div class="feature">🚗 السيارات</div>
<div class="feature">🕒 الخدمة 24/7</div>
</div>

</section>

</body>
</html>
