<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f5f5,#e9ecef);
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#1a1a2e,#111827);
    color:#fff;
    padding:40px;
    text-align:center;
    animation:fadeDown 0.6s ease;
}

@keyframes fadeDown{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

.logo{
    font-size:52px;
    font-weight:bold;
}

.logo span{
    color:#ffd700;
}

/* CARDS */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:25px;
    justify-content:center;
}

.card{
    background:#fff;
    border-radius:25px;
    padding:35px;
    text-align:center;
    width:280px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
    cursor:pointer;
    animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.icon{
    font-size:65px;
    margin-bottom:15px;
}

/* BUTTON */
.btn{
    background:#ffd700;
    color:#1a1a2e;
    padding:10px 25px;
    border-radius:40px;
    text-decoration:none;
    font-weight:bold;
    display:inline-block;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#e6c200;
}

/* FOOTER */
.footer{
    background:#1a1a2e;
    color:#888;
    text-align:center;
    padding:30px;
    margin-top:50px;
}

.footer a{
    color:#ffd700;
    margin:0 10px;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */
@media(max-width:768px){
    .card{width:100%;}
}
</style>
