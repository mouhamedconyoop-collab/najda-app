<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم كفني - نجدة</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            background: #111;
            border-radius: 35px;
            padding: 50px 45px;
            max-width: 650px;
            width: 100%;
            border: 1px solid #333;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h2{
            text-align: center;
            color: #ffd700;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .sub{
            text-align: center;
            color: #888;
            font-size: 15px;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        label{
            display: block;
            margin: 25px 0 10px;
            color: #ffd700;
            font-weight: bold;
            font-size: 16px;
        }
        input, select, textarea{
            width: 100%;
            padding: 16px 18px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 20px;
            font-size: 16px;
            transition: 0.3s;
            font-family: inherit;
            color: #fff;
        }
        input:focus, select:focus, textarea:focus{
            outline: none;
            border-color: #ffd700;
            background: #222;
        }
        button{
            background: #ffd700;
            color: #000;
            padding: 18px;
            border: none;
            border-radius: 50px;
            width: 100%;
            font-weight: bold;
            font-size: 20px;
            margin-top: 40px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover{
            background: #ffaa00;
            transform: scale(1.02);
        }
        .back{
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #888;
            text-decoration: none;
            font-size: 15px;
        }
        .back:hover{
            color: #ffd700;
        }
        .success{
            background: #00e676;
            color: #000;
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 25px;
            text-align: center;
            display: none;
            font-weight: bold;
            font-size: 16px;
        }
        select{
            cursor: pointer;
        }
        textarea{
            resize: vertical;
            min-height: 100px;
        }
        @media (max-width: 600px){
            .box{padding: 30px 25px;}
            h2{font-size: 28px;}
            button{font-size: 18px;padding: 15px;}
        }
    </style>
</head>
<body>
<div class="box">
    <h2>🜸 انضم كفني 🜸</h2>
    <div class="sub">سجل بياناتك وسنقوم بالتواصل معك</div>
    <div id="success" class="success">✅ تم إرسال طلبك بنجاح!</div>
    <form id="applyForm">
        <label>الاسم الكامل</label>
        <input type="text" id="name" required>

        <label>رقم الجوال</label>
        <input type="tel" id="phone" required>

        <label>التخصص</label>
        <select id="specialty" required>
            <option value="كهرباء">كهرباء</option>
            <option value="سباكة">سباكة</option>
            <option value="سيارات">سيارات</option>
        </select>

        <label>الخبرات</label>
        <textarea id="experience" rows="3"></textarea>

        <button type="submit">إرسال الطلب</button>
    </form>
    <a href="index.html" class="back">← العودة للرئيسية</a>
</div>
<script>
    document.getElementById('applyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let apps = JSON.parse(localStorage.getItem('applications') || '[]');
        apps.push({
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            specialty: document.getElementById('specialty').value,
            experience: document.getElementById('experience').value
        });
        localStorage.setItem('applications', JSON.stringify(apps));
        document.getElementById('success').style.display = 'block';
        document.getElementById('applyForm').reset();
        setTimeout(() => { document.getElementById('success').style.display = 'none'; }, 3000);
    });
</script>
</body>
</html>
