<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم كفني - نجدة</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f5f5;font-family:'Segoe UI',sans-serif;padding:20px;min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .box{background:#fff;border-radius:30px;padding:35px;max-width:500px;width:100%;}
        h2{text-align:center;color:#1a1a2e;margin-bottom:25px;}
        label{display:block;margin:15px 0 5px;color:#1a1a2e;font-weight:bold;}
        input,select,textarea{width:100%;padding:12px;background:#f5f5f5;border:1px solid #ddd;border-radius:15px;}
        button{background:#ffd700;color:#1a1a2e;padding:14px;border:none;border-radius:30px;width:100%;font-weight:bold;margin-top:20px;cursor:pointer;}
        .back{display:block;text-align:center;margin-top:15px;color:#888;text-decoration:none;}
        .success{background:#4caf50;color:#fff;padding:10px;border-radius:15px;margin-bottom:15px;display:none;}
    </style>
</head>
<body>
<div class="box">
    <h2>👨‍🔧 انضم كفني</h2>
    <div id="success" class="success">✅ تم إرسال طلبك!</div>
    <form id="applyForm">
        <label>الاسم الكامل</label>
        <input type="text" id="name" required>
        <label>رقم الجوال</label>
        <input type="tel" id="phone" required>
        <label>التخصص</label>
        <select id="specialty" required>
            <option value="كهرباء">كهرباء</option>
            <option value="سباكة">سباكة</option>
            <option value="سيارات">سيارات</option>
        </select>
        <label>الخبرات</label>
        <textarea id="experience" rows="2" placeholder="مثال: خبرة 3 سنوات في كهرباء المنازل"></textarea>
        <button type="submit">إرسال الطلب</button>
    </form>
    <a href="index.html" class="back">← العودة</a>
</div>
<script>
    document.getElementById('applyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let apps = JSON.parse(localStorage.getItem('applications') || '[]');
        apps.push({
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            specialty: document.getElementById('specialty').value,
            experience: document.getElementById('experience').value
        });
        localStorage.setItem('applications', JSON.stringify(apps));
        document.getElementById('success').style.display = 'block';
        document.getElementById('applyForm').reset();
        setTimeout(() => { document.getElementById('success').style.display = 'none'; }, 3000);
    });
</script>
</body>
</html>
