<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الفنيين - نجدة</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#1a1a2e;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .box{background:#fff;border-radius:30px;padding:45px;max-width:380px;width:100%;text-align:center;}
        h2{color:#1a1a2e;margin-bottom:25px;}
        input{width:100%;padding:14px;margin:10px 0;background:#f5f5f5;border:1px solid #ddd;border-radius:25px;}
        button{background:#ffd700;color:#1a1a2e;padding:14px;border:none;border-radius:30px;width:100%;font-weight:bold;cursor:pointer;}
        .error{color:#f44336;margin:10px 0;}
        .back{display:block;margin-top:15px;color:#888;text-decoration:none;}
    </style>
</head>
<body>
<div class="box">
    <h2>🔧 دخول الفنيين</h2>
    <div id="error" class="error"></div>
    <input type="tel" id="phone" placeholder="رقم الجوال">
    <input type="password" id="password" placeholder="كلمة السر">
    <button onclick="login()">دخول</button>
    <a href="index.html" class="back">← العودة</a>
</div>
<script>
    function login(){
        let phone=document.getElementById('phone').value;
        let password=document.getElementById('password').value;
        let techs=JSON.parse(localStorage.getItem('technicians')||'[]');
        if(phone==='22486661'&&password==='123456'){
            localStorage.setItem('currentTech',JSON.stringify({id:1,name:'محمد',phone:'22486661',specialty:'كهرباء',image:''}));
            window.location.href='tech_dashboard.html';
        } else {
            let tech=techs.find(t=>t.phone===phone&&t.password===password);
            if(tech){
                localStorage.setItem('currentTech',JSON.stringify(tech));
                window.location.href='tech_dashboard.html';
            } else {
                document.getElementById('error').innerText='رقم الجوال أو كلمة السر خطأ';
            }
        }
    }
</script>
</body>
</html>
