<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإدارة - نجدة</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f0f2f5;font-family:'Segoe UI',sans-serif;padding:20px;}
        .container{max-width:1200px;margin:auto;}
        .header{background:#1a1a2e;color:#fff;padding:15px;border-radius:20px;margin-bottom:25px;display:flex;justify-content:space-between;align-items:center;}
        .logo{font-size:24px;font-weight:bold;}
        .logo span{color:#ffd700;}
        .logout{background:#f44336;color:#fff;padding:8px 20px;border-radius:30px;text-decoration:none;}
        .stats{display:flex;gap:20px;margin-bottom:25px;flex-wrap:wrap;}
        .stat-card{background:#fff;border-radius:20px;padding:20px;flex:1;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
        .stat-number{font-size:32px;font-weight:bold;color:#ffd700;}
        .tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
        .tab{background:#ddd;padding:10px 20px;border-radius:30px;cursor:pointer;}
        .tab.active{background:#ffd700;color:#1a1a2e;}
        .tab-content{display:none;}
        .tab-content.active{display:block;}
        .card{background:#fff;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.05);border:1px solid #e0e0e0;}
        .status{padding:4px 12px;border-radius:20px;font-size:12px;color:#fff;display:inline-block;}
        .status-new{background:#ff9800;}
        .status-progress{background:#2196f3;}
        .status-done{background:#4caf50;}
        .btn{background:#ffd700;color:#1a1a2e;padding:8px 15px;border-radius:25px;border:none;cursor:pointer;margin:3px;font-weight:bold;}
        .btn-danger{background:#f44336;color:#fff;}
        .btn-success{background:#4caf50;color:#fff;}
        select{padding:8px;border-radius:15px;background:#fff;border:1px solid #ddd;}
        .empty{text-align:center;padding:40px;color:#888;}
        .chat-area{background:#fff;border-radius:20px;padding:20px;margin-top:20px;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
        .chat-messages{height:350px;overflow-y:auto;background:#fafafa;border-radius:15px;padding:15px;margin-bottom:15px;}
        .message{display:flex;margin-bottom:12px;}
        .message.sent{justify-content:flex-end;}
        .message.received{justify-content:flex-start;}
        .bubble{max-width:70%;padding:10px 14px;border-radius:18px;}
        .sent .bubble{background:#dcf8c5;color:#1a1a2e;}
        .received .bubble{background:#fff;color:#1a1a2e;border:1px solid #ddd;}
        .chat-input{display:flex;gap:10px;}
        .chat-input input{flex:1;padding:12px;border-radius:25px;border:1px solid #ddd;background:#fff;}
        .chat-input button{background:#ffd700;color:#1a1a2e;border:none;padding:12px 20px;border-radius:25px;cursor:pointer;font-weight:bold;}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🜸 <span>نجدة</span> 🜸</div>
        <a href="admin_login.html" class="logout" onclick="localStorage.removeItem('admin_logged')">خروج</a>
    </div>
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="statOrders">0</div><div>طلبات</div></div>
        <div class="stat-card"><div class="stat-number" id="statTechs">0</div><div>فنيين</div></div>
        <div class="stat-card"><div class="stat-number" id="statApps">0</div><div>طلبات توظيف</div></div>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="showTab('orders')">📋 الطلبات</div>
        <div class="tab" onclick="showTab('technicians')">👥 الفنيين</div>
        <div class="tab" onclick="showTab('applications')">👨‍🔧 طلبات الانضمام</div>
        <div class="tab" onclick="showTab('chat')">💬 دردشة الفنيين</div>
    </div>
    <div id="ordersTab" class="tab-content active"><div id="ordersList"></div></div>
    <div id="techniciansTab" class="tab-content"><div id="techList"></div></div>
    <div id="applicationsTab" class="tab-content"><div id="applyList"></div></div>
    <div id="chatTab" class="tab-content">
        <div class="chat-area">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="اكتب رسالة للفنيين...">
                <button onclick="sendAdminMessage()">إرسال</button>
            </div>
        </div>
    </div>
</div>
<script>
    if(localStorage.getItem('admin_logged') !== 'true') window.location.href = 'admin_login.html';
    function showTab(tab){
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        document.getElementById(tab+'Tab').classList.add('active');
        if(tab==='chat') loadAdminMessages();
    }
    function loadOrders(){
        let orders=JSON.parse(localStorage.getItem('orders')||'[]');
        let techs=JSON.parse(localStorage.getItem('technicians')||'[]');
        document.getElementById('statOrders').innerText=orders.length;
        let container=document.getElementById('ordersList');
        if(orders.length===0){container.innerHTML='<div class="empty">📭 لا توجد طلبات</div>';return;}
        container.innerHTML='';
        orders.reverse().forEach(order=>{
            let statusClass=order.status==='جديد'?'status-new':(order.status==='قيد التنفيذ'?'status-progress':'status-done');
            container.innerHTML+=`<div class="card"><div><strong>#${order.id}</strong> | ${order.service} | <span class="status ${statusClass}">${order.status}</span></div><div>👤 ${order.name}</div><div>📱 ${order.phone}</div><div>📍 ${order.address}</div><div style="margin-top:15px;">${order.technicianId?`<span>✅ تم الإرسال لفني: ${techs.find(t=>t.id===order.technicianId)?.name||order.technicianId}</span>`:`<select id="techSelect_${order.id}"><option value="">-- اختر فني --</option>${techs.map(t=>`<option value="${t.id}">${t.name} (${t.specialty})</option>`).join('')}</select><button class="btn" onclick="assignTech(${order.id})">📨 إرسال للفني</button>`}<button class="btn btn-danger" onclick="deleteOrder(${order.id})">🗑️ حذف</button></div></div>`;
        });
    }
    function assignTech(orderId){
        let techId=parseInt(document.getElementById(`techSelect_${orderId}`).value);
        if(!techId){alert('الرجاء اختيار فني أولاً');return;}
        let orders=JSON.parse(localStorage.getItem('orders')||'[]');
        orders=orders.map(o=>o.id===orderId?{...o,technicianId:techId,status:'قيد التنفيذ'}:o);
        localStorage.setItem('orders',JSON.stringify(orders));
        loadOrders();
        alert('✅ تم إرسال الطلب للفني بنجاح');
    }
    function deleteOrder(orderId){
        if(confirm('هل أنت متأكد من حذف هذا الطلب؟')){
            let orders=JSON.parse(localStorage.getItem('orders')||'[]');
            orders=orders.filter(o=>o.id!==orderId);
            localStorage.setItem('orders',JSON.stringify(orders));
            loadOrders();
        }
    }
    function loadTechnicians(){
        let techs=JSON.parse(localStorage.getItem('technicians')||'[]');
        document.getElementById('statTechs').innerText=techs.length;
        let container=document.getElementById('techList');
        if(techs.length===0){container.innerHTML='<div class="empty">👤 لا يوجد فنيين</div>';return;}
        container.innerHTML='';
        techs.forEach((tech,idx)=>{container.innerHTML+=`<div class="card"><div><strong>${tech.name}</strong> | ${tech.specialty}</div><div>📱 ${tech.phone}</div><button class="btn btn-danger" onclick="deleteTech(${idx})">🗑️ حذف</button></div>`;});
    }
    function deleteTech(idx){
        if(confirm('حذف هذا الفني؟')){
            let techs=JSON.parse(localStorage.getItem('technicians')||'[]');
            techs.splice(idx,1);
            localStorage.setItem('technicians',JSON.stringify(techs));
            loadTechnicians();
            loadOrders();
        }
    }
    function loadApplications(){
        let apps=JSON.parse(localStorage.getItem('applications')||'[]');
        document.getElementById('statApps').innerText=apps.length;
        let container=document.getElementById('applyList');
        if(apps.length===0){container.innerHTML='<div class="empty">📭 لا توجد طلبات</div>';return;}
        container.innerHTML='';
        apps.forEach((app,idx)=>{container.innerHTML+=`<div class="card"><div><strong>${app.name}</strong> | ${app.specialty}</div><div>📱 ${app.phone}</div><div>${app.experience||''}</div><div><button class="btn btn-success" onclick="acceptTech(${idx})">✅ قبول</button> <button class="btn btn-danger" onclick="rejectTech(${idx})">❌ رفض</button></div></div>`;});
    }
    function acceptTech(idx){
        let apps=JSON.parse(localStorage.getItem('applications')||'[]');
        let techs=JSON.parse(localStorage.getItem('technicians')||'[]');
        let newId=Date.now();
        techs.push({id:newId,name:apps[idx].name,phone:apps[idx].phone,specialty:apps[idx].specialty,password:apps[idx].phone});
        apps.splice(idx,1);
        localStorage.setItem('technicians',JSON.stringify(techs));
        localStorage.setItem('applications',JSON.stringify(apps));
        loadTechnicians();
        loadApplications();
        alert('✅ تم قبول الفني بنجاح');
    }
    function rejectTech(idx){
        let apps=JSON.parse(localStorage.getItem('applications')||'[]');
        apps.splice(idx,1);
        localStorage.setItem('applications',JSON.stringify(apps));
        loadApplications();
        alert('❌ تم رفض الفني');
    }
    function loadAdminMessages(){
        let msgs=JSON.parse(localStorage.getItem('admin_messages')||'[]');
        let container=document.getElementById('chatMessages');
        if(msgs.length===0){container.innerHTML='<div class="empty">✨ ابدأ المحادثة مع الفنيين ✨</div>';return;}
        container.innerHTML='';
        msgs.forEach(msg=>{
            let div=document.createElement('div');
            div.className=`message ${msg.sender==='إدارة'?'sent':'received'}`;
            div.innerHTML=`<div class="bubble"><strong>${msg.sender}</strong><br>${msg.message}<br><small>${new Date(msg.time).toLocaleTimeString()}</small></div>`;
            container.appendChild(div);
        });
        container.scrollTop=container.scrollHeight;
    }
    function sendAdminMessage(){
        let input=document.getElementById('chatInput');
        let msg=input.value.trim();
        if(!msg)return;
        let msgs=JSON.parse(localStorage.getItem('admin_messages')||'[]');
        msgs.push({sender:'إدارة',message:msg,time:Date.now()});
        localStorage.setItem('admin_messages',JSON.stringify(msgs));
        input.value='';
        loadAdminMessages();
    }
    document.getElementById('chatInput')?.addEventListener('keypress',e=>{if(e.key==='Enter')sendAdminMessage();});
    loadOrders();loadTechnicians();loadApplications();
    setInterval(()=>{loadOrders();loadTechnicians();loadApplications();loadAdminMessages();},3000);
</script>
</body>
</html>
