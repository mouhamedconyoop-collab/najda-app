<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدردشة - نجدة</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#e5ddd5;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;}
        .header{background:#075e54;color:#fff;padding:15px;display:flex;align-items:center;gap:12px;}
        .back-btn{background:#fff;color:#075e54;border:none;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;}
        .header h3{flex:1;}
        .messages{flex:1;overflow-y:auto;padding:15px;}
        .message{display:flex;margin-bottom:15px;}
        .message.sent{justify-content:flex-end;}
        .message.received{justify-content:flex-start;}
        .bubble{max-width:75%;padding:10px 14px;border-radius:18px;}
        .sent .bubble{background:#dcf8c5;color:#111;border-bottom-right-radius:4px;}
        .received .bubble{background:#fff;color:#111;border-bottom-left-radius:4px;box-shadow:0 1px 1px rgba(0,0,0,0.05);}
        .sender-name{font-size:10px;font-weight:bold;margin-bottom:4px;color:#075e54;}
        .time{font-size:9px;color:#888;margin-top:4px;display:block;text-align:right;}
        .input-area{background:#f0f0f0;padding:12px;display:flex;gap:10px;border-top:1px solid #ddd;}
        .input-area input{flex:1;padding:12px;border:none;border-radius:25px;background:#fff;font-size:14px;}
        .input-area button{background:#075e54;color:#fff;border:none;padding:12px 20px;border-radius:25px;cursor:pointer;font-weight:bold;}
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <h3>💬 محادثة</h3>
    </div>
    <div class="messages" id="messages">
        <div style="text-align:center;color:#888;padding:30px;">✨ ابدأ المحادثة ✨</div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="اكتب رسالة...">
        <button onclick="sendMessage()">إرسال</button>
    </div>
    <script>
        let orderId = localStorage.getItem('currentChatOrder') || '1';
        let messages = JSON.parse(localStorage.getItem(`chat_${orderId}`) || '[]');
        let currentUser = localStorage.getItem('chatUser') || 'عميل';
        
        // تحديد إذا كان المستخدم فني أو عميل
        if(window.location.href.includes('tech') || localStorage.getItem('currentTech')){
            currentUser = 'فني';
            localStorage.setItem('chatUser', 'فني');
        } else {
            currentUser = 'عميل';
            localStorage.setItem('chatUser', 'عميل');
        }
        
        function loadMessages() {
            const container = document.getElementById('messages');
            if(messages.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#888;padding:30px;">✨ ابدأ المحادثة ✨</div>';
                return;
            }
            container.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                const isSent = (msg.sender === currentUser);
                div.className = `message ${isSent ? 'sent' : 'received'}`;
                div.innerHTML = `
                    <div class="bubble">
                        ${!isSent ? `<div class="sender-name">${msg.sender}</div>` : ''}
                        ${msg.message}
                        <span class="time">${new Date(msg.time).toLocaleTimeString()}</span>
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if(!msg) return;
            messages.push({sender: currentUser, message: msg, time: Date.now()});
            localStorage.setItem(`chat_${orderId}`, JSON.stringify(messages));
            input.value = '';
            loadMessages();
        }
        
        document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });
        loadMessages();
        setInterval(loadMessages, 3000);
    </script>
</body>
</html>
