
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الفني - نجدة</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0a;font-family:'Segoe UI',sans-serif;padding:20px;}
        .container{max-width:700px;margin:auto;}
        .profile{background:#111;border-radius:30px;padding:30px;text-align:center;margin-bottom:25px;border:1px solid #333;}
        .profile-img{width:100px;height:100px;margin:0 auto 15px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;border:3px solid #ffd700;}
        .profile-img img{width:100%;height:100%;object-fit:cover;}
        .profile-img span{font-size:50px;}
        .profile-name{font-size:24px;color:#ffd700;font-weight:bold;}
        .specialty{background:#ffd700;color:#000;padding:5px 15px;border-radius:30px;display:inline-block;margin-top:10px;}
        .btn-outline{background:#1a1a2e;color:#fff;padding:12px;border:none;border-radius:30px;width:100%;font-weight:bold;margin-top:12px;cursor:pointer;}
        .card{background:#111;border-radius:25px;padding:20px;margin-bottom:15px;border:1px solid #333;}
        .current{border-right:5px solid #ffd700;}
        .btn{background:#ffd700;color:#000;padding:12px;border:none;border-radius:30px;width:100%;font-weight:bold;margin-top:8px;cursor:pointer;}
        .btn-chat{background:#2196f3;color:#fff;}
        .empty{text-align:center;padding:30px;color:#888;}
        .section-title{font-size:18px;color:#ffd700;margin:20px 0 10px;font-weight:bold;}
        .flex-buttons{display:flex;gap:10px;margin-top:12px;}
        .flex-buttons .btn{flex:1;margin-top:0;}
        #fileInput{display:none;}
    </style>
</head>
<body>
<div class="container">
    <div class="profile">
        <div class="profile-img" onclick="document.getElementById('fileInput').click()">
            <span id="profileIcon">👤</span>
            <img id="profileImage" style="display:none;">
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="updateImage()">
        <div class="profile-name" id="techName"></div>
        <div id="techPhone"></div>
        <div class="specialty" id="techSpecialty"></div>
        <button class="btn-outline" onclick="logout()">🚪 تسجيل خروج</button>
    </div>
    <div class="section-title">📌 طلباتي الحالية</div>
    <div id="currentOrders"></div>
    <div class="section-title">✅ الطلبات المنجزة</div>
    <div id="completedOrders"></div>
</div>
<script>
    let currentTech = JSON.parse(localStorage.getItem('currentTech') || 'null');
    if(!currentTech){
        currentTech = {id: 1, name: 'محمد', phone: '22486661', specialty: 'كهرباء', image: ''};
        localStorage.setItem('currentTech', JSON.stringify(currentTech));
    }
    document.getElementById('techName').innerText = currentTech.name;
    document.getElementById('techPhone').innerText = currentTech.phone;
    document.getElementById('techSpecialty').innerText = currentTech.specialty;
    if(currentTech.image){
        document.getElementById('profileIcon').style.display = 'none';
        document.getElementById('profileImage').style.display = 'block';
        document.getElementById('profileImage').src = currentTech.image;
    }
    function loadOrders(){
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');
        let current = orders.filter(o => o.technicianId === currentTech.id && o.status !== 'تم الإنجاز');
        let completed = orders.filter(o => o.technicianId === currentTech.id && o.status === 'تم الإنجاز');
        const currentDiv = document.getElementById('currentOrders');
        const completedDiv = document.getElementById('completedOrders');
        if(current.length === 0){currentDiv.innerHTML = '<div class="empty">لا توجد طلبات حالية</div>';}
        else{currentDiv.innerHTML = '';current.forEach(order => {currentDiv.innerHTML += `<div class="card current"><p><strong>📍 ${order.address}</strong></p><p>👤 ${order.name} | 📱 ${order.phone}</p><div class="flex-buttons"><button class="btn" onclick="completeOrder(${order.id})">✅ تم الإنجاز</button><button class="btn btn-chat" onclick="openChat(${order.id})">💬 دردشة</button></div></div>`;});}
        if(completed.length === 0){completedDiv.innerHTML = '<div class="empty">لا توجد طلبات منجزة</div>';}
        else{completedDiv.innerHTML = '';completed.forEach(order => {completedDiv.innerHTML += `<div class="card"><p>${order.address.substring(0,50)}</p><p style="color:#4caf50;">✓ تم الإنجاز</p></div>`;});}
    }
    function completeOrder(orderId){
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');
        orders = orders.map(o => o.id === orderId ? {...o, status: 'تم الإنجاز'} : o);
        localStorage.setItem('orders', JSON.stringify(orders));
        loadOrders();
    }
    function openChat(orderId){
        localStorage.setItem('currentChatOrder', orderId);
        window.open('chat.html', '_blank', 'width=400,height=600');
    }
    function updateImage(){
        const file = document.getElementById('fileInput').files[0];
        if(file){
            const reader = new FileReader();
            reader.onload = function(e){
                currentTech.image = e.target.result;
                localStorage.setItem('currentTech', JSON.stringify(currentTech));
                document.getElementById('profileIcon').style.display = 'none';
                document.getElementById('profileImage').style.display = 'block';
                document.getElementById('profileImage').src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }
    function logout(){
        localStorage.removeItem('currentTech');
        window.location.href = 'tech_login.html';
    }
    loadOrders();
    setInterval(loadOrders, 5000);
</script>
</body>
</html>
